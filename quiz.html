<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Filler Hub</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #0f0f11;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #1a1a1d;
            padding: 35px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 420px;
            border: 1px solid #2a2a2d;
        }
        h2 { color: #00E676; margin-top: 0; text-align: center; font-size: 28px; letter-spacing: 1px; }
        p.subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; font-weight: bold;}
        
        input {
            width: 100%;
            padding: 14px;
            background-color: #252528;
            border: 1px solid #3a3a3d;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { outline: none; border-color: #00E676; box-shadow: 0 0 8px rgba(0, 230, 118, 0.2); }
        
        /* Highlight the link paste box */
        #form-link { border-left: 4px solid #bb86fc; }
        
        button {
            width: 100%;
            padding: 16px;
            margin-top: 15px;
            background-color: #00E676;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background-color: #00c853; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        
        .footer { text-align: center; margin-top: 25px; font-size: 12px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>GHOST FILLER</h2>
    <p class="subtitle">Paste your quiz link. Get a 100% pre-filled form.</p>
    
    <div class="form-group">
        <label>Paste Quiz Link Here</label>
        <input type="url" id="form-link" placeholder="https://docs.google.com/forms/d/e/...">
    </div>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="E.g. Jeevan R">
    </div>

    <div class="form-group">
        <label>Email ID</label>
        <input type="email" id="email" placeholder="E.g. you@example.com">
    </div>

    <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="10-digit number">
    </div>

    <div class="form-group">
        <label>USN (Optional)</label>
        <input type="text" id="usn" placeholder="Only needed for Python quiz">
    </div>

    <button onclick="generateMagicLink()">Inject Answers</button>

    <div class="footer">
        Bypasses mobile restrictions. Just scroll down and hit submit.
    </div>
</div>

<script>
function generateMagicLink() {
    const rawLink = document.getElementById('form-link').value.trim();
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const usn = document.getElementById('usn').value.trim();
    
    // Basic validation
    if (!rawLink || !rawLink.includes("docs.google.com/forms")) {
        return alert("Bro, paste a valid Google Form link first!");
    }
    if (!name || !email || !phone) {
        return alert("Bro, fill in your Name, Email, and Phone!");
    }

    // Get today's date in YYYY-MM-DD format for the forms
    const today = new Date().toISOString().split('T')[0];
    const params = new URLSearchParams();

    // Determine which quiz they pasted by looking at the unique ID in the URL
    if (rawLink.includes("1FAIpQLSeU7AZlJyKX8_LK5tQWGxPQhuF-CBni2SXpvywyP7bBLBVf7A")) {
        // --- PYTHON QUIZ ---
        params.append("entry.862231310", email);
        params.append("entry.1153648703", name);
        params.append("entry.82800352", phone);
        params.append("entry.1812341125", usn || "Not Provided");
        params.append("entry.1606234610", "HKBK College of Engineering");
        params.append("entry.1675952199", today);

        const pyAns = {
            "1687348338": "Guido van Rossum", "457200217": "Interpreted", "705990197": "#",
            "1186409837": "print()", "1979733469": "input()", "391306647": "if",
            "1331389970": "Both A and B", "978434453": ".py", "557477640": "float",
            "1420494868": "*", "24393759": "/", "340035816": "%", "259960346": "def",
            "2056466031": "List", "2019115569": "import", "1538825667": "Tuple",
            "125737138": "len()", "1784099334": "**", "184849092": "break",
            "1050276306": "continue", "877924517": "except", "180219526": "int()",
            "1653112074": "while", "1884049936": "Dictionary", "502114326": "str()",
            "329104410": "pass", "884269505": "type()", "1524438798": "and",
            "1319160536": "return", "1168363310": "max()", "1673126766": "Both B and C",
            "2018767233": "All of the above", "793239294": "All of the above",
            "1810786330": "abs()", "125062178": "lambda", "1649562323": "pop()",
            "2001654994": "round()", "1355802976": "sum()", "1645147545": "range()",
            "2014298055": "Variable type is decided at runtime"
        };
        for (let id in pyAns) params.append(`entry.${id}`, pyAns[id]);

    } else if (rawLink.includes("1FAIpQLSeqLQyPfu2zfdS1-eddyebVJMC9ypoGhJhQtpO0RBGGflTw3A")) {
        // --- HTML QUIZ ---
        params.append("entry.862231310", email);
        params.append("entry.1812341125", name);
        params.append("entry.82800352", phone);
        params.append("entry.192342574", today);

        const htmlAns = {
            "476017059": "Hyper Text Markup Language", "435596838": "Tim Berners-Lee",
            "1058330736": "<a>", "2134741813": "<img>", "547437122": "src",
            "2046056824": "<h6>", "1902056010": "<br>", "1470773810": "<ul>",
            "149354126": "<tr>", "915197726": "<form>", "1399058386": "password",
            "352485302": "<link>", "53036039": "<!DOCTYPE html>", "1640263324": "<dropdown>",
            "63725472": "<th>", "1816605553": "required", "38697770": 'target="_blank"',
            "336515277": "<body>", "863993020": "id", "1766048953": "<head>"
        };
        for (let id in htmlAns) params.append(`entry.${id}`, htmlAns[id]);

    } else if (rawLink.includes("1FAIpQLScaanL5hwtw-ZPfKFAFgDK0tu87sfY0Bb4PF6ndVRiIMh2hKQ")) {
        // --- DJANGO QUIZ ---
        params.append("entry.862231310", email);
        params.append("entry.1812341125", name);
        params.append("entry.82800352", phone);
        params.append("entry.192342574", today);

        const djangoAns = {
            "476017059": "Python", "435596838": "Django Software Foundation",
            "1058330736": "MVT", "2134741813": "django-admin startproject",
            "547437122": "settings.py", "2046056824": "python manage.py runserver",
            "1902056010": "models.py", "1470773810": "urls.py",
            "149354126": "<%= variable %>", "915197726": "python manage.py startapp",
            "1399058386": "SQLite", "352485302": "@login_required",
            "53036039": "Python", "1640263324": "views.py",
            "63725472": "python manage.py migrate", "1816605553": "python manage.py makemigrations",
            "38697770": "{% for %}", "336515277": "{% if %}",
            "863993020": "apps.py", "1766048953": "render()", "1405241629": "urls.py"
        };
        for (let id in djangoAns) params.append(`entry.${id}`, djangoAns[id]);
        
    } else {
        return alert("Unrecognized Quiz Link! Make sure it's the exact Python, HTML, or Django link from your teacher.");
    }

    // Clean up the raw link to ensure it ends in /viewform before appending params
    let cleanUrl = rawLink.split('?')[0]; 
    if (!cleanUrl.endsWith('/viewform')) {
        cleanUrl = cleanUrl.replace('/edit', '/viewform');
    }

    // Redirect to the pre-filled form
    window.location.href = cleanUrl + "?" + params.toString();
}
</script>

</body>
</html>
